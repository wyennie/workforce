    { name = "jinja2", marker = "extra == 'web'", specifier = ">=3.1.0" },
    { name = "mcp", marker = "extra == 'mcp'", specifier = ">=1.0.0" },
    { name = "mypy", marker = "extra == 'dev'", specifier = ">=1.10" },
    { name = "prompt-toolkit", specifier = ">=3.0" },
    { name = "pydantic", specifier = ">=2.6" },
