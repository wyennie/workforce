[[package]]
name = "workforce"
source = { editable = "." }
dependencies = [
    { name = "claude-agent-sdk" },
    { name = "prompt-toolkit" },
    { name = "pydantic" },
    { name = "rich" },
    { name = "tomli-w" },
    { name = "typer" },
]

[package.optional-dependencies]
dev = [
    { name = "fastapi" },
    { name = "httpx" },
    { name = "jinja2" },
    { name = "mypy" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "ruff" },
]
mcp = [
    { name = "mcp" },
]
web = [
    { name = "fastapi" },
    { name = "jinja2" },
    { name = "uvicorn", extra = ["standard"] },
]
webhook = [
    { name = "fastapi" },
    { name = "uvicorn" },
]

[package.metadata]
requires-dist = [
    { name = "claude-agent-sdk", specifier = ">=0.1.0" },
